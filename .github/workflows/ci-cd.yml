name: backend-ci-cd

# CI on every PR; CI + deploy to Cloud Run on push to main.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Typecheck · Lint · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test

  deploy:
    name: Deploy to Cloud Run
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write          # required for the GitHub OIDC token (WIF)
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      # Env vars + the FIREBASE_WEB_API_KEY secret already persist on the service,
      # so a plain source deploy is all that's needed.
      - name: Deploy
        run: |
          gcloud run deploy dcpl-backend \
            --source . \
            --region asia-south1 \
            --quiet

      - name: Smoke test /api/health
        run: |
          URL=$(gcloud run services describe dcpl-backend --region asia-south1 --format='value(status.url)')
          code=$(curl -s -o /dev/null -w '%{http_code}' "$URL/api/health")
          echo "health check → HTTP $code"
          test "$code" = "200"
